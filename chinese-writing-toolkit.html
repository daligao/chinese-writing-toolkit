<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinese Writing Toolkit · 中文写作练习</title>
<style>
  :root{
    --red:#C0392B; --red-d:#922B21; --red-s:rgba(192,57,43,.08); --red-l:#E8B4B0;
    --bg:#F5F0EF; --card:#FFFFFF; --ink:#1E2330; --soft:#556; --faint:#8A93A6;
    --line:#E6E0DF; --line2:#D8D0CE;
    --mono:'SF Mono',ui-monospace,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --shad:0 1px 2px rgba(30,35,48,.04),0 4px 14px rgba(30,35,48,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.65;-webkit-font-smoothing:antialiased}
  .wrap{max-width:780px;margin:0 auto;padding:20px 18px 70px}
  header h1{font-size:1.5rem;margin:0;letter-spacing:-.01em}
  header .sub{color:var(--soft);font-size:.86rem;margin-top:3px}
  .crumbs{display:flex;align-items:center;gap:8px;margin:14px 0 8px;font-size:.84rem;color:var(--soft);flex-wrap:wrap}
  .crumbs button{border:1px solid var(--line2);background:var(--card);border-radius:999px;padding:5px 13px;cursor:pointer;color:var(--red-d);font-family:var(--sans);font-size:.84rem}
  .crumbs button:hover{border-color:var(--red)}
  .crumbs span.sep{color:var(--faint)}
  .catsec{margin-top:22px}
  .catsec h2{font-size:1.04rem;margin:0 0 4px;display:flex;align-items:center;gap:9px}
  .catsec h2 .dot{width:9px;height:9px;border-radius:50%;background:var(--red)}
  .catsec .cdesc{font-size:.8rem;color:var(--faint);margin:0 0 11px}
  .tgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .tcard{text-align:left;border:1px solid var(--line);background:var(--card);border-radius:14px;padding:13px 14px;cursor:pointer;box-shadow:var(--shad);font-family:var(--sans)}
  .tcard:hover{border-color:var(--red)}
  .tcard b{display:block;font-size:.98rem;color:var(--ink)}
  .tcard i{font-style:normal;font-size:.74rem;color:var(--faint)}
  .bigcard{display:block;width:100%;text-align:left;border:1px dashed var(--red-l);background:var(--red-s);border-radius:14px;padding:14px 16px;cursor:pointer;margin-top:10px;font-family:var(--sans)}
  .bigcard:hover{border-color:var(--red)}
  .bigcard b{font-size:1rem;color:var(--red-d)} .bigcard p{margin:5px 0 0;font-size:.82rem;color:var(--soft)}
  .doc h2{font-size:1.35rem;margin:6px 0 2px} .doc .den{font-family:var(--mono);color:var(--faint);font-size:.84rem;margin-bottom:10px}
  .intro{background:var(--red-s);border-left:3px solid var(--red);border-radius:0 10px 10px 0;padding:11px 14px;font-size:.9rem;margin-bottom:18px}
  .intro .lab{color:var(--red-d);font-weight:700}
  .block{margin-bottom:20px}
  .block h3{font-size:1.04rem;margin:0 0 9px;padding-left:11px;border-left:4px solid var(--red-l)}
  .struct{display:flex;flex-direction:column;gap:7px}
  .struct .st{display:flex;gap:10px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:9px 12px}
  .struct .st .sp{flex:none;background:var(--red);color:#fff;border-radius:7px;padding:1px 9px;font-size:.8rem;font-weight:700}
  .struct .st .sd{font-size:.88rem;color:var(--ink)}
  .sent{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:9px 12px;margin-bottom:7px}
  .sent .se{font-size:.95rem;display:flex;gap:8px;align-items:flex-start}
  .sent .se .say{flex:none;border:1px solid var(--red-l);background:var(--red-s);border-radius:7px;padding:0 7px;cursor:pointer;font-size:.8rem;line-height:1.7;color:var(--red-d)}
  .sent .sz{font-size:.82rem;color:var(--soft);margin-top:4px;padding-top:4px;border-top:1px dashed var(--line2)}
  .skeleton{white-space:pre-wrap;background:#1f2330;color:#e8e8f0;border-radius:12px;padding:14px 16px;font-family:var(--mono);font-size:.86rem;line-height:1.8}
  .skeleton .bk{color:#ffd479}
  .note{font-size:.78rem;color:var(--faint);margin-top:6px}
  .model{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px 16px;box-shadow:var(--shad)}
  .model .mp{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
  .model .mp .say{flex:none;border:1px solid var(--red-l);background:var(--red-s);border-radius:7px;padding:0 8px;cursor:pointer;font-size:.8rem;line-height:1.7;color:var(--red-d)}
  .model .mp .mt{font-size:.97rem;line-height:1.75;white-space:pre-wrap}
  .model .mz{display:none;border-top:1px dashed var(--line2);margin-top:6px;padding-top:10px;color:var(--soft);font-size:.88rem;white-space:pre-wrap}
  .model .mz.show{display:block}
  .btn-toggle-en{border:1px solid var(--line2);background:var(--card);border-radius:8px;padding:6px 12px;font-size:.82rem;cursor:pointer;color:var(--soft);font-family:var(--sans);margin-top:6px}
  .btn-toggle-en:hover{border-color:var(--red);color:var(--red-d)}
  table.gt{width:100%;border-collapse:collapse;margin-top:4px;font-size:.88rem}
  table.gt th,table.gt td{border:1px solid var(--line2);padding:7px 10px;text-align:left;vertical-align:top}
  table.gt th{background:var(--red-s);color:var(--red-d)}
  table.gt td.k{font-size:1rem;color:var(--ink)}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
  .chip{background:var(--red-s);border:1px solid var(--red-l);border-radius:999px;padding:3px 11px;font-size:.84rem;color:var(--red-d)}
  .grp{margin-bottom:13px} .grp .gh{font-size:.85rem;font-weight:700;color:var(--ink);margin-bottom:5px}
  .pat{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin-bottom:8px}
  .pat .pn{font-size:.8rem;color:var(--red-d);font-weight:700;margin-bottom:3px}
  .pat .pe{font-size:.92rem;display:flex;gap:8px;align-items:flex-start}
  .pat .pe .say{flex:none;border:1px solid var(--red-l);background:var(--red-s);border-radius:7px;padding:0 7px;cursor:pointer;font-size:.78rem;color:var(--red-d)}
  .pat .pz{font-size:.82rem;color:var(--soft);margin-top:4px;padding-top:4px;border-top:1px dashed var(--line2)}
  .check li{font-size:.88rem;margin:5px 0 5px 2px;list-style:none;position:relative;padding-left:24px}
  .check li::before{content:'';position:absolute;left:0;color:var(--red);font-size:1rem}
  .pad textarea{width:100%;min-height:300px;border:1px solid var(--line2);border-radius:12px;padding:14px;font-size:1.05rem;line-height:1.9;font-family:var(--sans);resize:vertical}
  .pad textarea:focus{outline:none;border-color:var(--red)}
  .padbar{display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap}
  .padbar .wc{font-size:.84rem;color:var(--soft);margin-right:auto}
  .padbar button{border:1px solid var(--line2);background:var(--card);border-radius:10px;padding:8px 14px;font-size:.85rem;cursor:pointer;color:var(--soft);font-family:var(--sans)}
  .padbar button.primary{background:var(--red);border-color:var(--red);color:#fff;font-weight:600}
  .btnrow{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
  .btnrow button{flex:1;min-width:130px;border:1.5px solid var(--line2);background:#fff;border-radius:12px;padding:12px;font-size:.92rem;font-weight:700;cursor:pointer;color:var(--soft);font-family:var(--sans)}
  .btnrow button.primary{background:var(--red);border-color:var(--red);color:#fff}
  footer{margin-top:30px;text-align:center;color:var(--faint);font-size:.74rem}
  @media(max-width:560px){.tgrid{grid-template-columns:1fr}.wrap{padding:16px 14px 50px}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Chinese Writing Toolkit <span style="font-size:.7em;color:var(--faint)">· 中文写作练习</span></h1>
    <div class="sub">8 letter types · sentence banks · word upgrades · practice pad · for HSK4–6 learners · <a href="https://ordinarymantrying.com/tools/" style="color:var(--red-d)" target="_blank">more free tools</a></div>
  </header>
  <div class="crumbs" id="crumbs"></div>
  <div id="view"></div>
  <footer>Offline · No login · Runs in browser · Progress saved locally<br>Made with ♥ by <a href="https://ordinarymantrying.com" style="color:var(--red-d);text-decoration:none" target="_blank">ordinarymantrying.com</a> · More free tools at <a href="https://ordinarymantrying.com/tools/" style="color:var(--red-d);text-decoration:none" target="_blank">Tools page</a></footer>
</div>
<script>
const W = {
  applied: [
    {
      id:'invite', name:'邀请信', en:'Invitation Letter',
      scene:'Inviting a friend, teacher, or guest to an event: party, contest, trip, lecture, etc.',
      points:'Use 您 for formal contexts, 你 for friends. Use 将 for upcoming events. Tone: warm and polite.',
      structure:[
        ['开头 Opening','State your purpose — invite the reader to a specific event.'],
        ['主体 Body','Give event details: time, place, content, why you are inviting them.'],
        ['结尾 Closing','Express hope they will attend and ask for a reply.']
      ],
      opens:[
        {zh:'我写信是想邀请您参加……',en:'I am writing to invite you to ……'},
        {zh:'我诚心邀请您来参加我们的……',en:'I sincerely invite you to join our ……'},
        {zh:'我很荣幸地邀请您出席……',en:'It is my honour to invite you to attend ……'}
      ],
      bodies:[
        {zh:'活动将于……在……举行。',en:'The event will be held at …… on ……'},
        {zh:'届时我们将……，相信您一定会喜欢。',en:'We will …… and I believe you will enjoy it very much.'},
        {zh:'我们邀请您的原因是……',en:'The reason we are inviting you is that ……'},
        {zh:'如果您能来，将会为我们增添很多光彩。',en:'Your presence would mean a great deal to us.'}
      ],
      closes:[
        {zh:'真诚希望您能来，期待您的回复。',en:'I sincerely hope you can come and look forward to your reply.'},
        {zh:'如果您能参加，将是我们的荣幸。',en:'It would be our great honour if you could join us.'},
        {zh:'请尽快告知您是否能够出席。',en:'Please let us know as soon as possible whether you can attend.'}
      ],
      template:'亲爱的___，\n  我写信是想邀请您参加___（活动名称）。活动将于___（时间）在___（地点）举行。\n  届时我们将___（活动内容/安排）。我们邀请您的原因是___。\n  真诚希望您能来，期待您的回复。\n您的，___',
      model:{
        zh:'亲爱的史密斯先生，\n  我写信是想邀请您参加我们学校的中文演讲比赛。比赛将于下周五下午三点在学校报告厅举行。\n  届时将有十位同学围绕「我与中国」主题发表演讲。作为我们的中文老师，诚挚邀请您担任评委，您的专业点评对我们意义重大。\n  真诚希望您能来，期待您的回复。\n您的，李明',
        en:'Dear Mr. Smith,\n  I am writing to invite you to our school\'s Chinese Speech Contest. It will be held in the school lecture hall at 3 p.m. next Friday.\n  Ten students will give speeches on the theme of "Me and China". As our Chinese teacher, you are warmly invited to be one of the judges. Your professional feedback means a great deal to us.\n  I sincerely hope you can come and look forward to your reply.\nYours, Li Ming'
      }
    },
    {
      id:'thanks', name:'感谢信', en:'Thank-you Letter',
      scene:'Thanking someone for their help, hospitality, guidance, or a gift.',
      points:'Use past tense to recall what they did. Be specific. Tone: sincere and warm.',
      structure:[
        ['开头 Opening','Express gratitude and state what you are thankful for.'],
        ['主体 Body','Describe what they did and the impact it had on you.'],
        ['结尾 Closing','Thank them again; express a wish to repay their kindness.']
      ],
      opens:[
        {zh:'我写信是为了向您表示衷心的感谢。',en:'I am writing to express my sincere gratitude to you.'},
        {zh:'语言难以表达我对您帮助的感激之情。',en:'Words cannot fully express how grateful I am for your help.'},
        {zh:'感谢您在……期间给予我的帮助。',en:'Thank you so much for the help you gave me during ……'}
      ],
      bodies:[
        {zh:'多亏了您的帮助，我……',en:'Thanks to your help, I ……'},
        {zh:'您……的行为让我非常感动。',en:'I was deeply moved by your act of ……'},
        {zh:'没有您的支持，我不可能……',en:'Without your support, I could not have ……'},
        {zh:'您的帮助对我来说意义深远。',en:'Your help has made a profound difference to me.'}
      ],
      closes:[
        {zh:'我真的非常感激，希望有机会能报答您的好意。',en:'I am truly grateful and hope to repay your kindness someday.'},
        {zh:'再次向您致以最衷心的感谢。',en:'Once again, thank you from the bottom of my heart.'},
        {zh:'希望您一切顺利，身体健康。',en:'I wish you all the best and good health.'}
      ],
      template:'亲爱的___，\n  我写信是为了向您表示衷心的感谢，感谢您___（感谢的具体事项）。\n  多亏了您的帮助，我___（具体影响/结果）。您___的行为让我非常感动。\n  我真的非常感激，希望有机会能报答您的好意。\n您的，___',
      model:{
        zh:'亲爱的王老师，\n  我写信是为了向您表示衷心的感谢，感谢您在我学习中文期间给予我的悉心指导。\n  多亏了您耐心的讲解，我的口语进步了很多。您总是鼓励我多开口说话，这让我克服了对说中文的恐惧。没有您的支持，我不可能在这么短的时间内取得这样的进步。\n  再次向您致以最衷心的感谢，希望有机会能请您吃顿饭。\n您的，Tom',
        en:'Dear Teacher Wang,\n  I am writing to express my sincere gratitude for your patient guidance during my Chinese studies.\n  Thanks to your encouragement to speak up, I have overcome my fear of speaking Chinese and improved a great deal. Without your support, I could not have made such progress in so short a time.\n  Once again, thank you from the bottom of my heart. I hope to treat you to dinner sometime soon.\nYours, Tom'
      }
    },
    {
      id:'advice', name:'建议信', en:'Letter of Advice',
      scene:'Giving suggestions on someone\'s problem: studying Chinese, adapting to China, health, etc.',
      points:'Use 建议/应该/最好 for suggestions. Give 2-3 specific, practical points. Tone: friendly and helpful.',
      structure:[
        ['开头 Opening','Acknowledge the person\'s problem and say you would like to help.'],
        ['主体 Body','Give 2-3 specific suggestions with brief reasons.'],
        ['结尾 Closing','Express hope the suggestions will help.']
      ],
      opens:[
        {zh:'得知您在……方面遇到了困难，我想提供一些建议。',en:'I\'m sorry to hear you\'re having trouble with …… Here are some suggestions.'},
        {zh:'我写信是想就……向您提供一些建议。',en:'I am writing to offer some advice on ……'},
        {zh:'希望以下几点建议对您有所帮助。',en:'I hope the following suggestions will be of help to you.'}
      ],
      bodies:[
        {zh:'首先，我建议您……',en:'First of all, I suggest that you ……'},
        {zh:'此外，……也是个好主意。',en:'What\'s more, it would also be a good idea to ……'},
        {zh:'最后，您最好……',en:'Last but not least, you\'d better ……'},
        {zh:'这样做的原因是……',en:'The reason for this is that ……'}
      ],
      closes:[
        {zh:'希望这些建议对您有所帮助。',en:'I hope these suggestions will be of some help to you.'},
        {zh:'如果照做，相信情况一定会好转。',en:'I am sure things will get better if you follow them.'},
        {zh:'如有需要，请随时告诉我。',en:'Please feel free to let me know if you need anything else.'}
      ],
      template:'亲爱的___，\n  得知您在___方面遇到了困难，我想提供一些建议。\n  首先，我建议您___。此外，___也是个好主意。最后，您最好___。\n  希望这些建议对您有所帮助。\n您的，___',
      model:{
        zh:'亲爱的Sarah，\n  得知您在学习中文方面遇到了困难，我想提供一些建议。\n  首先，我建议您每天看带中文字幕的中国电视剧，这样既有趣又能提高听力。此外，找一个中国笔友练习写作也是个好主意。最后，您最好坚持每天背十个新词，积累词汇量非常重要。\n  希望这些建议对您有所帮助，相信您的中文一定会越来越好！\n您的，李华',
        en:'Dear Sarah,\n  I\'m sorry to hear you\'re having trouble learning Chinese. Here are some suggestions.\n  First, I suggest watching Chinese TV dramas with subtitles every day — it\'s fun and great for your listening. What\'s more, finding a Chinese pen pal to practise writing would also be a great idea. Last but not least, you\'d better memorise ten new words every day, as building vocabulary is essential.\n  I hope these suggestions help. I believe your Chinese will get better and better!\nYours, Li Hua'
      }
    },
    {
      id:'apology', name:'道歉信', en:'Letter of Apology',
      scene:'Apologising for being late, missing an appointment, damaging something, or causing trouble.',
      points:'Apologise first, then explain the reason, then offer a remedy. Tone: sincere and humble.',
      structure:[
        ['开头 Opening','Express your apology and state what you are apologising for.'],
        ['主体 Body','Explain the reason; offer to make it up.'],
        ['结尾 Closing','Apologise again and ask for understanding.']
      ],
      opens:[
        {zh:'我写信是为了就……向您道歉。',en:'I am writing to apologise to you for ……'},
        {zh:'请接受我对……的诚挚歉意。',en:'Please accept my sincere apology for ……'},
        {zh:'我非常抱歉地告诉您……',en:'I am very sorry to tell you that ……'}
      ],
      bodies:[
        {zh:'原因是……',en:'The reason for this was that ……'},
        {zh:'为了弥补，我想……',en:'To make it up to you, I would like to ……'},
        {zh:'我绝非有意给您添麻烦。',en:'I never meant to cause you any trouble.'},
        {zh:'我保证以后不会再发生类似的事情。',en:'I promise this will not happen again.'}
      ],
      closes:[
        {zh:'真心希望您能理解并原谅我。',en:'I sincerely hope you can understand and forgive me.'},
        {zh:'再次为给您带来的不便深表歉意。',en:'Once again, I am truly sorry for the inconvenience caused.'},
        {zh:'期待您的回复。',en:'I look forward to your reply.'}
      ],
      template:'亲爱的___，\n  我写信是为了就___向您道歉。\n  原因是___。为了弥补，我想___。我保证以后不会再发生类似的事情。\n  真心希望您能理解并原谅我。\n您的，___',
      model:{
        zh:'亲爱的张老师，\n  我写信是为了就上周迟到参加中文课向您道歉。\n  原因是我在路上遇到了严重的堵车，公交车晚点了将近四十分钟。为了弥补，我已经从同学那里借来了课堂笔记，并把错过的内容都补上了。我保证以后会提前出发，不会再迟到了。\n  真心希望您能理解并原谅我。再次为给您带来的不便深表歉意。\n您的，David',
        en:'Dear Teacher Zhang,\n  I am writing to apologise for arriving late to Chinese class last week.\n  The reason was that I was caught in heavy traffic and the bus was nearly forty minutes late. To make it up, I have borrowed notes from a classmate and caught up on everything I missed. I promise I will leave earlier in the future and will not be late again.\n  I sincerely hope you can understand and forgive me. Once again, I am truly sorry.\nYours, David'
      }
    },
    {
      id:'apply', name:'申请信', en:'Application Letter',
      scene:'Applying for a volunteer role, club membership, scholarship, exchange programme, or job.',
      points:'State the position/programme, then give 2-3 reasons you are a good fit. Tone: confident and polite.',
      structure:[
        ['开头 Opening','State what you are applying for and where you heard about it.'],
        ['主体 Body','Give your qualifications, skills, and relevant experience.'],
        ['结尾 Closing','Express hope to be selected; thank them for considering your application.']
      ],
      opens:[
        {zh:'我写信是想申请……职位/项目。',en:'I am writing to apply for the position/programme of ……'},
        {zh:'我想申请成为……的……',en:'I would like to apply to be a …… in ……'},
        {zh:'得知贵方正在招募……，我希望能提交申请。',en:'Having learned that you are recruiting ……, I would like to submit my application.'}
      ],
      bodies:[
        {zh:'我认为我能胜任此职，理由如下。',en:'I believe I am a good fit for the following reasons.'},
        {zh:'首先，我能说一口流利的中英文。',en:'First, I can speak both Chinese and English fluently.'},
        {zh:'此外，我曾参加……，积累了丰富的经验。',en:'Besides, I have participated in …… and gained valuable experience.'},
        {zh:'我性格开朗，善于与人沟通。',en:'I am outgoing and good at communicating with people.'}
      ],
      closes:[
        {zh:'如蒙录用，我将不胜感激。',en:'I would be truly grateful if I could be selected.'},
        {zh:'感谢您考虑我的申请，期待您的回复。',en:'Thank you for considering my application. I look forward to your reply.'},
        {zh:'我相信这次机会对我来说意义重大。',en:'I believe this opportunity would mean a great deal to me.'}
      ],
      template:'尊敬的___，\n  我写信是想申请___（职位/项目）。我认为我能胜任此职，理由如下。\n  首先，___。此外，___。我相信___。\n  如蒙录用，我将不胜感激。感谢您考虑我的申请。\n您的，___',
      model:{

const $=id=>document.getElementById(id);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function speak(t){
  try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='zh-CN';u.rate=.9;speechSynthesis.speak(u);}catch(e){}
}

function setCrumbs(arr){
  $('crumbs').innerHTML=arr.map(c=>c.go?'<button data-go="'+c.go+'">'+esc(c.t)+'</button>':'<span>'+esc(c.t)+'</span>').join('<span class="sep">&#x203A;</span>');
  $('crumbs').querySelectorAll('button').forEach(b=>b.onclick=()=>route(b.dataset.go));
}

function route(g){
  if(g==='home') renderHome();
  else if(g==='tool') renderTool();
  else if(g==='pad') renderPad();
}

function wireSay(){
  $('view').querySelectorAll('[data-say]').forEach(b=>b.onclick=()=>speak(b.dataset.say));
}

function sentList(arr){
  return arr.map(s=>`
    <div class="sent">
      <div class="se"><button class="say" data-say="${esc(s.zh)}">&#x1F50A;</button><span>${esc(s.zh)}</span></div>
      <div class="sz">${esc(s.en)}</div>
    </div>`).join('');
}

  setCrumbs([{t:'Home'}]);
  let h='<div class="catsec"><h2><span class="dot"></span>Applied Writing &#x5E94;&#x7528;&#x6587;&#x5199;&#x4F5C;</h2>';

  h+='</div></div>';
  h+='<div class="catsec"><h2><span class="dot"></span>Word Upgrade Toolbox &#x63D0;&#x5206;&#x5DE5;&#x5177;&#x7B71;</h2>';
  h+='<p class="cdesc">Replace plain words with high-level Chinese. Connectors, advanced patterns, and a writing checklist.</p>';
  h+='<button class="bigcard" data-go="tool"><b>Open Toolbox &#x2192;</b><p>Swap &#x5F88;&#x597D;/&#x4F46;&#x662F;/&#x6211;&#x8BA4;&#x4E3A; for more sophisticated expressions. Includes grammar patterns that impress.</p></button></div>';
  h+='<div class="catsec"><h2><span class="dot"></span>Practice Pad &#x7EC3;&#x4E60;&#x672C;</h2>';
  h+='<p class="cdesc">Write in Chinese here. Auto character count, save locally, and check against the writing checklist.</p>';
  h+='<button class="bigcard" data-go="pad"><b>Open Practice Pad &#x2192;</b><p>Type in Chinese, count characters, save your draft, and self-check before submitting.</p></button></div>';
  $('view').innerHTML=h;
  $('view').querySelectorAll('.tcard').forEach(b=>b.onclick=()=>renderGenre(b.dataset.id));
  $('view').querySelectorAll('.bigcard').forEach(b=>b.onclick=()=>route(b.dataset.go));
}

function renderGenre(id){
  window.scrollTo({top:0});
  const g=W.applied.find(x=>x.id===id); if(!g) return;
  setCrumbs([{t:'Home',go:'home'},{t:g.name+' '+g.en}]);
  let h=`<div class="doc"><h2>${esc(g.name)}</h2><div class="den">${esc(g.en)}</div>`;
  h+=`<div class="intro"><div><span class="lab">Situation &#x9002;&#x7528;&#x573A;&#x666F;&#xFF1A;</span>${esc(g.scene)}</div><div style="margin-top:5px"><span class="lab">Key tips &#x5199;&#x4F5C;&#x8981;&#x70B9;&#xFF1A;</span>${esc(g.points)}</div></div>`;
  h+='<div class="block"><h3>Structure &#x8C0B;&#x7BC7;&#x7ED3;&#x6784;</h3><div class="struct">';
  g.structure.forEach(s=>{h+=`<div class="st"><span class="sp">${esc(s[0])}</span><span class="sd">${esc(s[1])}</span></div>`;});
  h+='</div></div>';
  h+='<div class="block"><h3>Opening sentences &#x5F00;&#x5934;&#x53E5;</h3>'+sentList(g.opens)+'</div>';
  h+='<div class="block"><h3>Body sentences &#x4E3B;&#x4F53;&#x53E5;</h3>'+sentList(g.bodies)+'</div>';
  h+='<div class="block"><h3>Closing sentences &#x7ED3;&#x5C3E;&#x53E5;</h3>'+sentList(g.closes)+'</div>';
  const skel=esc(g.template).replace(/___/g,'<span class="bk">______</span>');
  h+=`<div class="block"><h3>Template &#x4E07;&#x80FD;&#x6A21;&#x677F;</h3><div class="skeleton">${skel}</div><div class="note">Replace the highlighted blanks with your specific content.</div></div>`;
  h+=`<div class="block"><h3>Model Essay &#x8303;&#x6587;</h3><div class="model">
    <div class="mp"><button class="say" data-say="${esc(g.model.zh)}">&#x1F50A;</button><div class="mt">${esc(g.model.zh)}</div></div>
    <button class="btn-toggle-en" onclick="this.nextElementSibling.classList.toggle('show');this.textContent=this.nextElementSibling.classList.contains('show')?'&#x25BC; Hide English':'&#x25B6; Show English translation'">&#x25B6; Show English translation</button>
    <div class="mz">${esc(g.model.en)}</div>
    </div></div>`;
  h+='<div class="btnrow"><button onclick="renderHome()">&#x2190; Back</button><button class="primary" onclick="renderPad()">Practice pad &#x2192;</button></div></div>';
  $('view').innerHTML=h;
  wireSay();
}

function renderTool(){
  window.scrollTo({top:0});
  setCrumbs([{t:'Home',go:'home'},{t:'Toolbox &#x5DE5;&#x5177;&#x7B71;'}]);
  const T=W.toolbox;
  let h='<div class="block"><h3>Word Upgrade &#x8BCD;&#x8BED;&#x63D0;&#x5347;</h3><table class="gt"><tr><th>Plain &#x666E;&#x901A;</th><th>Better &#x9AD8;&#x7EA7;&#x8868;&#x8FBE;</th></tr>';
  T.replace.forEach(r=>{h+=`<tr><td class="k">${esc(r.plain)}</td><td><div class="chips">${r.better.map(b=>`<span class="chip">${esc(b)}</span>`).join('')}</div></td></tr>`;});
  h+='</table></div>';
  h+='<div class="block"><h3>Connectors &#x8FDE;&#x63A5;&#x8BCD;</h3>';
  T.connectors.forEach(c=>{h+=`<div class="grp"><div class="gh">${esc(c.group)}</div><div class="chips">${c.words.map(w=>`<span class="chip">${esc(w)}</span>`).join('')}</div></div>`;});
  h+='</div>';
  h+='<div class="block"><h3>Advanced Patterns &#x9AD8;&#x5206;&#x53E5;&#x578B;</h3>';
  T.patterns.forEach(p=>{h+=`<div class="pat"><div class="pn">${esc(p.name)}</div><div class="pe"><button class="say" data-say="${esc(p.zh)}">&#x1F50A;</button><span>${esc(p.zh)}</span></div><div class="pz">${esc(p.en)}</div></div>`;});
  h+='</div>';
  h+='<div class="block"><h3>Formal Phrases &#x6B63;&#x5F0F;&#x5957;&#x8BED;</h3>';
  h+='<p style="font-size:.8rem;color:var(--faint);margin:0 0 9px">Set phrases for formal letters and announcements. Copy and adapt as needed.</p>';
  T.formal.forEach(f=>{h+=`<div class="sent"><div class="se"><button class="say" data-say="${esc(f.zh)}">&#x1F50A;</button><span>${esc(f.zh)}</span></div><div class="sz">${esc(f.en)}</div></div>`;});
  h+='</div>';
  h+='<div class="block"><h3>Opening sentences &#x4E07;&#x80FD;&#x5F00;&#x5934;</h3>'+sentList(T.opens)+'</div>';
  h+='<div class="block"><h3>Closing sentences &#x4E07;&#x80FD;&#x7ED3;&#x5C3E;</h3>'+sentList(T.closes)+'</div>';
  h+='<div class="block"><h3>Self-check Checklist &#x5199;&#x4F5C;&#x81EA;&#x68C0;&#x6E05;&#x5355;</h3><ul class="check">';
  T.checklist.forEach(c=>{h+=`<li><span style="color:var(--ink)">${esc(c.zh)}</span><span style="display:block;font-size:.8rem;color:var(--faint);margin-top:1px">${esc(c.en)}</span></li>`;});
  h+='</ul></div>';
  $('view').innerHTML=h;
  wireSay();
}

const KEY='zh-writing-v1';
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}

function renderPad(){
  window.scrollTo({top:0});
  setCrumbs([{t:'Home',go:'home'},{t:'Practice Pad &#x7EC3;&#x4E60;&#x672C;'}]);
  const saved=lsGet(KEY)||'';
  const T=W.toolbox;
  let h=`<div class="block"><h3>Write in Chinese &#x5728;&#x8FD9;&#x91CC;&#x5199;&#x4E2D;&#x6587;</h3><div class="pad">
    <textarea id="pad-ta" placeholder="&#x5F00;&#x59CB;&#x5199;&#x4F5C;&#x2026;&#x2026;&#xFF08;Start writing in Chinese here&#xFF09;" oninput="updateWc()">${esc(saved)}</textarea>
    <div class="padbar">
      <span class="wc" id="wc">0 characters</span>
      <button id="btn-save" onclick="lsSet('${KEY}',document.getElementById('pad-ta').value);document.getElementById('btn-save').textContent='Saved ✓';setTimeout(()=>{document.getElementById('btn-save').textContent='Save draft'},1500)">Save draft</button>
      <button onclick="if(confirm('Clear the pad?')){document.getElementById('pad-ta').value='';updateWc();}">Clear</button>
      <button id="btn-copy" class="primary" onclick="navigator.clipboard.writeText(document.getElementById('pad-ta').value).then(()=>{document.getElementById('btn-copy').textContent='Copied ✓';setTimeout(()=>{document.getElementById('btn-copy').textContent='Copy'},1500)})">Copy</button>
    </div></div></div>`;
  h+='<div class="block"><h3>Self-check Checklist &#x5199;&#x4F5C;&#x81EA;&#x68C0;&#x6E05;&#x5355;</h3><ul class="check">';
  T.checklist.forEach(c=>{h+=`<li><span style="color:var(--ink)">${esc(c.zh)}</span><span style="display:block;font-size:.8rem;color:var(--faint);margin-top:1px">${esc(c.en)}</span></li>`;});
  h+='</ul></div>';
  $('view').innerHTML=h;
  updateWc();
}

function updateWc(){
  const ta=$('pad-ta'); if(!ta) return;
  const n=ta.value.replace(/\s/g,'').length;
  $('wc').textContent=n+' character'+(n===1?'':'s');
}

renderHome();
</script>
